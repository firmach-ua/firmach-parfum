<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MS Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #111111;
      --card-bg: #1a1a1a;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --accent: #e91e63;
      --accent-hover: #c2185b;
      --border: #2c2c2c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }
    header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
    }
    .logo {
      font-weight: bold;
      font-size: 1.2rem;
      color: var(--accent);
    }
    .search-box {
      padding: 10px 15px;
    }
    .search-box input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      box-sizing: border-box;
    }
    .cats {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 5px 15px 15px 15px;
    }
    .cat-chip {
      background: var(--card-bg);
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .cat-chip.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-img {
      height: 140px;
      background: #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .card-brand {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 500;
      margin: 4px 0 8px 0;
      line-height: 1.2;
      flex-grow: 1;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-price {
      font-weight: bold;
      color: var(--text);
    }
    .add-btn {
      background: var(--accent);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
    }
    .add-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }
    .admin-panel {
      padding: 15px;
      background: #1e1518;
      border-bottom: 1px solid var(--accent);
    }
    .admin-btn-main {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      width: 100%;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: #333; color: white; }

      text-align: center
