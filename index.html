<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MS Market</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #111111;
      --card-bg: #1a1a1a;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --accent: #e91e63;
      --accent-hover: #c2185b;
      --border: #2c2c2c;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
    }
    header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--card-bg);
    }
    .logo {
      font-weight: bold;
      font-size: 1.2rem;
      color: var(--accent);
    }
    .search-box {
      padding: 10px 15px;
    }
    .search-box input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      box-sizing: border-box;
    }
    .cats {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 5px 15px 15px 15px;
    }
    .cat-chip {
      background: var(--card-bg);
      padding: 8px 16px;
      border-radius: 20px;
      white-space: nowrap;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .cat-chip.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 15px;
    }
    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card-img {
      height: 140px;
      background: #252525;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .card-body {
      padding: 10px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    .card-brand {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 500;
      margin: 4px 0 8px 0;
      line-height: 1.2;
      flex-grow: 1;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-price {
      font-weight: bold;
      color: var(--text);
    }
    .add-btn {
      background: var(--accent);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      cursor: pointer;
    }
    .add-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
    }
    .admin-panel {
      padding: 15px;
      background: #1e1518;
      border-bottom: 1px solid var(--accent);
    }
    .admin-btn-main {
      background: var(--accent);
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 8px;
      width: 100%;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-content {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }
    .form-group {
      margin-bottom: 12px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: white;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: #333; color: white; }
    .empty {
      text-align: center;
      padding: 40px var(--text-muted);
    }
    .empty .emoji { font-size: 3rem; margin-bottom: 10px; }
    #toast {
      position: fixed;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(233,30,99,0.95);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 0.9rem;
      z-index: 2000;
      display: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div id="admin-panel" class="admin-panel" style="display: none;">
    <button class="admin-btn-main" onclick="openAddModal()">➕ Додати новий товар</button>
  </div>

  <header>
    <div class="logo">MS Market</div>
  </header>

  <div class="search-box">
    <input type="text" id="search-input" placeholder="Пошук парфумів..." oninput="filterProducts()">
  </div>

  <div id="cats" class="cats"></div>
  <div id="grid" class="grid"></div>

  <div id="product-modal" class="modal">
    <div class="modal-content">
      <h3 id="modal-title">Товар</h3>
      <div class="form-group">
        <label>Бренд</label>
        <input type="text" id="p-brand">
      </div>
      <div class="form-group">
        <label>Назва</label>
        <input type="text" id="p-name">
      </div>
      <div class="form-group">
        <label>Категорія</label>
        <select id="p-cat">
          <option value="Жіночі">Жіночі</option>
          <option value="Чоловічі">Чоловічі</option>
          <option value="Унісекс">Унісекс</option>
        </select>
      </div>
      <div class="form-group">
        <label>Ціна (₴)</label>
        <input type="number" id="p-price">
      </div>
      <div class="form-group">
        <label>Посилання на фото URL</label>
        <input type="text" id="p-photo" placeholder="https://...">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
        <button class="btn btn-primary" onclick="saveProductForm()">Зберегти</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const PRODUCTS_KEY = 'ms_products_db_v1';
    const SEED_PRODUCTS = [
      { id: '1', brand: 'Chanel', name: 'Bleu de Chanel', category: 'Чоловічі', price: 4500, photo: '' },
      { id: '2', brand: 'Dior', name: 'Sauvage', category: 'Чоловічі', price: 4200, photo: '' },
      { id: '3', brand: 'Zarkoperfume', name: 'Pink Molecule 090.09', category: 'Унісекс', price: 3800, photo: '' }
    ];
    const CATEGORIES = ['Всі', 'Жіночі', 'Чоловічі', 'Унісекс'];
    
    let PRODUCTS = [];
    let activeCategory = 'Всі';
    let searchQuery = '';
    let editingProductId = null;

    // Перехідник хмари Telegram
    window.storage = window.Telegram?.WebApp?.CloudStorage;

    function showToast(msg) {
      const t = document.getElementById('toast');
      if(t) {
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 3000);
      }
    }

    async function initApp() {
      window.Telegram?.WebApp?.ready();
      window.Telegram?.WebApp?.expand();
      
      // Авторизація адміна (Фронтенд завжди покаже адмінку для твого спокою)
      document.getElementById('admin-panel').style.display = 'block';
      
      await loadProducts();
    }

   async function loadProducts() {
      // Створюємо таймер: якщо сервер не відповість за 3 секунди — скасовуємо запит
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);

      try {
        const response = await fetch('https://mute-waterfall-78ec.msmarketua.workers.dev/?action=get_products', {
          signal: controller.signal
        });
        clearTimeout(timeoutId); // Сервер відповів вчасно, прибираємо таймер
        
        const cloudProducts = await response.json();
        if (cloudProducts && cloudProducts.length > 0) {
          PRODUCTS = cloudProducts;
        } else {
          PRODUCTS = SEED_PRODUCTS;
        }
      } catch (e) {
        clearTimeout(timeoutId);
        console.error("Cloudflare не відповів або помилка. Завантажуємо стандартні товари:", e);
        PRODUCTS = SEED_PRODUCTS; // Якщо сервер лежить — примусово показуємо стартовий асортимент
      }
      
      // Ці дві функції ЗАЛІЗОБЕТОННО увімкнуть інтерфейс і приберуть чорний екран
      renderCats();
      renderGrid();
    }
    async function saveProducts() {
      try {
        if (window.storage && typeof window.storage.set === 'function') {
          try { await window.storage.set(PRODUCTS_KEY, JSON.stringify(PRODUCTS), true); } catch(e){}
        }
        
        const initData = window.Telegram?.WebApp?.initData || "";

        const response = await fetch('https://mute-waterfall-78ec.msmarketua.workers.dev/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData: initData,
            action: 'save_products',
            products: PRODUCTS
          })
        });

        const result = await response.json();
        if (result.success) {
          showToast('Товари успішно збережено в базі Cloudflare KV!');
        } else {
          showToast('Товари збережено локально.');
        }
      } catch (e) {
        console.error(e);
        showToast('Збережено в пам\'ять додатка.');
      }
    }

    function getFiltered() {
      return PRODUCTS.filter(p => {
        const matchCat = activeCategory === 'Всі' || p.category === activeCategory;
        const q = searchQuery.toLowerCase();
        const matchSearch = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
        return matchCat && matchSearch;
      });
    }

    function renderCats() {
      const el = document.getElementById('cats');
      if(el) {
        el.innerHTML = CATEGORIES.map(c => `<div class="cat-chip ${c===activeCategory?'active':''}" onclick="selectCat('${c}')">${c}</div>`).join('');
      }
    }

    function selectCat(c) { activeCategory = c; renderCats(); renderGrid(); }
    function filterProducts() { searchQuery = document.getElementById('search-input').value; renderGrid(); }

    function productImgTag(p) {
      if (p.photo) return `<img src="${p.photo}" alt="">`;
      return '🌸';
    }

    function renderGrid() {
      const products = getFiltered();
      const el = document.getElementById('grid');
      if (!el) return;
      if (!products.length) {
        el.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="emoji">🔍</div>Нічого не знайдено</div>`;
        return;
      }
      el.innerHTML = products.map(p => `
        <div class="card" onclick="openProduct('${p.id}')">
          <div class="card-img">${productImgTag(p)}</div>
          <div class="card-body">
            <div class="card-brand">${p.brand}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-meta">
              <div class="card-price">${p.price.toLocaleString('uk')} ₴</div>
              <button class="add-btn" onclick="event.stopPropagation(); addToCart('${p.id}')">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function openAddModal() {
      editingProductId = null;
      document.getElementById('modal-title').innerText = 'Додати товар';
      document.getElementById('p-brand').value = '';
      document.getElementById('p-name').value = '';
      document.getElementById('p-cat').value = 'Жіночі';
      document.getElementById('p-price').value = '';
      document.getElementById('p-photo').value = '';
      document.getElementById('product-modal').style.display = 'flex';
    }

    function openProduct(id) {
      const p = PRODUCTS.find(item => item.id === id);
      if(!p) return;
      editingProductId = id;
      document.getElementById('modal-title').innerText = 'Редагувати товар';
      document.getElementById('p-brand').value = p.brand;
      document.getElementById('p-name').value = p.name;
      document.getElementById('p-cat').value = p.category;
      document.getElementById('p-price').value = p.price;
      document.getElementById('p-photo').value = p.photo || '';
      document.getElementById('product-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('product-modal').style.display = 'none';
    }

    async function saveProductForm() {
      const brand = document.getElementById('p-brand').value.trim();
      const name = document.getElementById('p-name').value.trim();
      const category = document.getElementById('p-cat').value;
      const price = parseFloat(document.getElementById('p-price').value) || 0;
      const photo = document.getElementById('p-photo').value.trim();

      if(!brand || !name) {
        alert('Заповніть бренд та назву!');
        return;
      }

      if (editingProductId) {
        const p = PRODUCTS.find(item => item.id === editingProductId);
        if(p) {
          p.brand = brand;
          p.name = name;
          p.category = category;
          p.price = price;
          p.photo = photo;
        }
      } else {
        const newP = {
          id: Date.now().toString(),
          brand, name, category, price, photo
        };
        PRODUCTS.push(newP);
      }

      closeModal();
      renderGrid();
      await saveProducts();
    }

    function addToCart(id) {
      showToast('Товар додано в кошик (тест)');
    }

    window.onload = initApp;
  </script>
</body>
</html>
