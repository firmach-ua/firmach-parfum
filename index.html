  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 0.5px solid var(--gold); color: var(--text); padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; }

</style>

<script>
const PRODUCTS_KEY = 'products_list';
let PRODUCTS = [];
const CATEGORIES = ['Всі', 'Жіночі', 'Чоловічі'];
let activeCategory = 'Всі';
let searchQuery = '';
let cart = {};
let currentProduct = null;
let editingProductId = null;
let pendingPhotoData = null;
window.storage = window.Telegram?.WebApp?.CloudStorage;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function uid() { return 'p_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

const SEED_PRODUCTS = [
  { id:'p1', brand:'Chanel', name:'N°5 Eau de Parfum', photo:null, price:3200, volume:'50 мл', category:'Жіночі', notes:'Альдегіди, троянда, жасмин, іланг-іланг, сандал, цивет. Легендарний аромат 1921 року.' },
  { id:'p2', brand:'Dior', name:'Sauvage EDT', photo:null, price:2900, volume:'100 мл', category:'Чоловічі', notes:'Калабрійський бергамот, перець Сечуань, лаванда, амбрина, кедр. Свіжий і потужний.' },
  { id:'p3', brand:'Guerlain', name:'Mon Guerlain', photo:null, price:2400, volume:'50 мл', category:'Жіночі', notes:'Лаванда з Прованса, ваніль, сандал, кумарин. Солодко-квіткова мрія.' },
  { id:'p4', brand:'Creed', name:'Aventus', photo:null, price:8900, volume:'50 мл', category:'Чоловічі', notes:'Ананас, береза, мускус, дубовий мох, ваніль. Культовий аромат успіху.' },
];

async function loadProducts() {
  try {
    const result = await window.storage.get(PRODUCTS_KEY, true);
    PRODUCTS = JSON.parse(result.value);
  } catch (e) {
    PRODUCTS = SEED_PRODUCTS;
    try { await window.storage.set(PRODUCTS_KEY, JSON.stringify(PRODUCTS), true); } catch(e2) {}
  }
  renderCats();
  renderGrid();
}

async function loadProducts() {
  try {
    // ЗАВАНТАЖЕННЯ ТОВАРІВ З БАЗИ CLOUDFLARE
    const response = await fetch('https://mute-waterfall-78ec.msmarketua.workers.dev/?action=get_products');
    const cloudProducts = await response.json();
    
    if (cloudProducts && cloudProducts.length > 0) {
      PRODUCTS = cloudProducts;
    } else {
      // Якщо в базі Cloudflare порожньо — беремо початкові товари
      PRODUCTS = SEED_PRODUCTS;
    }
  } catch (e) {
    console.error("Помилка завантаження з Cloudflare, пробуємо Telegram:", e);
    try {
      const result = await window.storage.get(PRODUCTS_KEY, true);
      PRODUCTS = JSON.parse(result.value) || SEED_PRODUCTS;
    } catch (err) {
      PRODUCTS = SEED_PRODUCTS;
    }
  }
  renderCats();
  renderGrid();
}

async function saveProducts() {
  try {
    // 1. Локальне збереження у хмару Telegram
    if (window.storage && typeof window.storage.set === 'function') {
      await window.storage.set(PRODUCTS_KEY, JSON.stringify(PRODUCTS), true);
    }
    
    const initData = window.Telegram?.WebApp?.initData || "";

    // 2. ВІДПРАВКА НА CLOUDFLARE WORKER ДЛЯ ЗБЕРЕЖЕННЯ В KV
    const response = await fetch('https://mute-waterfall-78ec.msmarketua.workers.dev/', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json' 
      },
      body: JSON.stringify({
        initData: initData,
        action: 'save_products',
        products: PRODUCTS
      })
    });

    const result = await response.json();
    
    if (result.success) {
      showToast('Товари успішно збережено в базі Cloudflare KV!');
    } else if (result.error) {
      showToast('Помилка сервера: ' + result.error);
    } else {
      showToast('Товари збережено.');
    }

  } catch (e) {
    console.error("Помилка відправки на Cloudflare:", e);
    showToast('Помилка з\'єднання з сервером.');
  }
}

function getFiltered() {
  return PRODUCTS.filter(p => {

    const q = searchQuery.toLowerCase();
    const matchSearch = !q || p.name.toLowerCase().includes(q) || p.brand.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
  const tg = window.Telegram?.WebApp;
  if (tg) tg.HapticFeedback?.impactOccurred('light');
  showToast('Додано в кошик');
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((a,b) => a+b, 0);
  const badge = document.getElementById('cart-badge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
}

function openCart() { renderCart(); document.getElementById('cart-modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeCart() { document.getElementById('cart-modal').classList.remove('open'); document.body.style.overflow = ''; }
function closeCartModal(e) { if (e.target === document.getElementById('cart-modal')) closeCart(); }

function renderCart() {
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  const el = document.getElementById('cart-items');
  const footer = document.getElementById('cart-footer');
  if (!ids.length) {
    el.innerHTML = `<div class="cart-empty">🛍 Кошик порожній<br><span style="font-size:13px;margin-top:6px;display:block">Додайте парфуми до замовлення</span></div>`;
    footer.style.display = 'none';
    return;
  }
  let total = 0;
  el.innerHTML = ids.map(id => {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p) return '';
    const qty = cart[id];
    total += p.price * qty;
    return `<div class="cart-item">
      <div class="cart-item-emoji">${productImgTag(p)}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.brand} ${p.name}</div>
        <div class="cart-item-price">${(p.price*qty).toLocaleString('uk')} ₴</div>
      </div>
      <div class="qty-control">
        <div class="qty-btn" onclick="changeQty('${id}',-1)">−</div>
        <div class="qty-num">${qty}</div>
        <div class="qty-btn" onclick="changeQty('${id}',1)">+</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cart-total').textContent = total.toLocaleString('uk') + ' ₴';
  footer.style.display = 'block';
}

function changeQty(id, delta) {
  cart[id] = (cart[id] || 0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateCartBadge();
  renderCart();
}

function placeOrder() {
  const items = Object.keys(cart).map(id => {
    const p = PRODUCTS.find(x => x.id === id);
    if (!p) return '';
    return `• ${p.brand} ${p.name} (${p.volume || ''}) x${cart[id]} — ${(p.price * cart[id]).toLocaleString('uk')} ₴`;
  }).filter(Boolean).join('\n');
  const total = Object.keys(cart).reduce((sum,id) => {
    const p = PRODUCTS.find(x => x.id === id);
    return p ? sum + p.price * cart[id] : sum;
  }, 0);
  const text = `Привіт! Хочу зробити замовлення в firma.ch Parfum:\n\n${items}\n\n💰 Разом: ${total.toLocaleString('uk')} ₴`;
  const url = `https://t.me/manager_779?text=${encodeURIComponent(text)}`;
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.openLink(url); } else { window.open(url, '_blank'); }
  cart = {};
  updateCartBadge();
  closeCart();
}

function handlePhotoUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxDim = 700;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = h * maxDim / w; w = maxDim; }
      else if (h > maxDim) { w = w * maxDim / h; h = maxDim; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.78);
      pendingPhotoData = compressed;
      const preview = document.getElementById('photo-preview');
      preview.src = compressed;
      preview.style.display = 'block';
      document.getElementById('photo-upload-text').textContent = 'Натисніть, щоб змінити фото';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveProductForm() {
  const brand = document.getElementById('f-brand').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  if (!brand || !name || !price) {
    showToast('Заповніть бренд, назву і ціну');
    return;
  }
  const data = {
    brand, name,
    category: document.getElementById('f-category').value,
    volume: document.getElementById('f-volume').value.trim(),
    price,
    notes: document.getElementById('f-notes').value.trim(),
    photo: pendingPhotoData
  };
  if (editingProductId) {
    const idx = PRODUCTS.findIndex(p => p.id === editingProductId);
    if (idx > -1) PRODUCTS[idx] = { ...PRODUCTS[idx], ...data };
  } else {
    PRODUCTS.push({ id: uid(), ...data });
  }
  await saveProducts();
  closeProductForm();
  renderAdminList();
  renderGrid();
  showToast('Збережено');
}
